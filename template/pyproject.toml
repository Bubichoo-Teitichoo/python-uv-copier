    "mkdocs>=1.5.3",
    "mkdocs-material>=9.5.18",
    "mkdocstrings[python]>=0.24.3",
    "mike>=2.0.0",
]
test = [
    "pytest>=8.1.1",
    "pytest-cov>=5.0.0",
]
dev = [
    "ruff>=0.4.1",
    "pre-commit>=3.7.0",
]
