[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[project]
name = "test-project" #"{{snake}}"
version = "0.1.0"
description = "description placeholder"
authors = [
    {name = "Philipp Krüger", email = "github.khab3@passinbox.com"},
]
dependencies = []
requires-python = ">=3.10"
readme = "README.md"
